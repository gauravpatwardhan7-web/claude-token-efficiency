name: Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: [ '3.7', '3.8', '3.9', '3.10', '3.11', '3.12' ]
        os: [ ubuntu-latest, macos-latest, windows-latest ]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Syntax check
      run: python3 -m py_compile analyzer.py

    - name: Import test
      run: python3 -c "import sys; sys.path.insert(0, '.'); exec(open('analyzer.py').read().split('if __name__')[0]); print('✓ Imports OK')"

    - name: Format check
      run: python3 -m py_compile SKILL.md README.md

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install flake8
      run: pip install flake8
    - name: Lint with flake8
      run: flake8 analyzer.py --count --select=E9,F63,F7,F82 --show-source --statistics
